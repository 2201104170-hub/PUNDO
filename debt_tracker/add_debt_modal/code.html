<!DOCTYPE html>

<html class="dark" lang="en"><head>

                        "tertiary-container": "#996100",
                        "secondary-fixed": "#6ffbbe",

                        "surface-variant": "#32343d",
                        "surface-container-highest": "#32343d",
                        "error": "#ffb4ab",

                        "on-tertiary": "#472a00",
                        "surface-container-lowest": "#0c0e16",
                        "on-error-container": "#ffdad6",
                        "primary-container": "#2563eb",
                        "on-secondary": "#003824",
                        "on-primary": "#002a78",
                        "on-surface": "#e1e2ed",

                        "tertiary": "#ffb95f",

                        "surface-bright": "#373942",
                        "on-tertiary-fixed": "#2a1700",
                        "on-surface-variant": "#c3c6d7",

                        "outline": "#8d90a0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"
                    },
                    "spacing": {
                        "container-max": "1280px",
                        "md": "16px",
                        "base": "4px",
                        "xs": "4px",
                        "lg": "24px",
                        "xl": "48px",
                        "gutter": "24px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Inter"],
                        "headline-lg": ["Inter"],

<style>
        .modal-enter {
            animation: modalIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        /* Custom scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 6px;
        }
        textarea::-webkit-scrollbar-track {
            background: transparent;
        }
        textarea::-webkit-scrollbar-thumb {
            background-color: #434655;
            border-radius: 10px;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body-lg text-body-lg h-screen w-screen overflow-hidden relative">
<!-- Background Context (Simulating Screen 5) -->
<div class="absolute inset-0 z-0 bg-cover bg-center opacity-40 blur-sm" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuANcUkIai1pzREbdwitzFSzbeiAdDoyDa0dZGJxKJkzJ88vmd2RiN1FHqeMTGfVr1D3JX_E6jhX-fn1qZZRX6seRlcd7x-uPl5y479v9WHrozRynqrEsf-G0GZPo2kApmEkmU_nMw5VJqG7e6Y04aJN2RMg4urnMVQ9_x-EWbY4IhIQ-LFJsdMyELyVq6oQj-DSAyOgZwRX5ZmvO26JkOw1SnF7nzmBmzTUorrTBl0dTPSPOOhQnW4laGby2W9RvvWZnfsAu8Gd8T6P');"></div>
<!-- Modal Overlay Backdrop -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-background/80 backdrop-blur-md p-4 sm:p-lg">
<!-- Modal Container -->
<div aria-labelledby="modal-title" aria-modal="true" class="modal-enter w-full max-w-[520px] bg-surface-container border border-outline-variant rounded-xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden relative" role="dialog">
<!-- Subtle Top Highlight -->
<div class="absolute top-0 inset-x-0 h-[1px] bg-gradient-to-r from-transparent via-white/10 to-transparent"></div>
<!-- Header -->
<div class="flex items-center justify-between px-lg py-md border-b border-outline-variant/40">
<h2 class="font-headline-md text-headline-md text-on-surface" id="modal-title">Add New Debt</h2>
<button aria-label="Close modal" class="text-on-surface-variant hover:text-on-surface transition-colors p-sm rounded-lg hover:bg-surface-variant/50 focus:outline-none focus:ring-2 focus:ring-primary/50" type="button">
<span class="material-symbols-outlined" data-icon="close" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
</div>
<!-- Form Body -->
<form class="p-lg flex flex-col gap-lg overflow-y-auto max-h-[716px]">
<!-- Person Name -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="personName">Person Name</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="person">person</span>
</div>
<input class="w-full bg-background border border-outline-variant rounded-lg pl-[44px] pr-md py-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="personName" name="personName" placeholder="e.g. Alex Johnson" type="text"/>
</div>
</div>
<!-- Grid for Type and Date -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-lg">
<!-- Debt Type -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="debtType">Type</label>
<div class="relative">
<select class="w-full bg-background border border-outline-variant rounded-lg px-md py-md font-body-md text-body-md text-on-surface appearance-none focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="debtType" name="debtType">
<option value="i_owe">I Owe</option>
<option value="owes_me">Owes Me</option>
</select>
<div class="absolute inset-y-0 right-0 pr-md flex items-center pointer-events-none text-on-surface-variant">
<span class="material-symbols-outlined text-[18px]" data-icon="expand_more">expand_more</span>
</div>
</div>
</div>
<!-- Due Date -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="dueDate">Due Date</label>
<div class="relative">
<input class="w-full bg-background border border-outline-variant rounded-lg px-md py-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all [&amp;::-webkit-calendar-picker-indicator]:opacity-0 [&amp;::-webkit-calendar-picker-indicator]:absolute [&amp;::-webkit-calendar-picker-indicator]:right-4 [&amp;::-webkit-calendar-picker-indicator]:w-5 [&amp;::-webkit-calendar-picker-indicator]:h-5 [&amp;::-webkit-calendar-picker-indicator]:cursor-pointer z-10 bg-transparent" id="dueDate" name="dueDate" type="date"/>
<div class="absolute inset-y-0 right-0 pr-md flex items-center pointer-events-none text-on-surface-variant z-0">
<span class="material-symbols-outlined text-[18px]" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</div>
</div>
<!-- Original Amount -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="amount">Original Amount</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant font-numeric-display text-numeric-display">
                            $
                        </div>
<input class="w-full bg-background border border-outline-variant rounded-lg pl-[36px] pr-md py-md font-numeric-display text-numeric-display text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all" id="amount" min="0" name="amount" placeholder="0.00" step="0.01" type="number"/>
</div>
</div>
<!-- Notes -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm" for="notes">Notes (Optional)</label>
<textarea class="w-full bg-background border border-outline-variant rounded-lg px-md py-md font-body-md text-body-md text-on-surface placeholder:text-on-surface-variant/40 focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary transition-all resize-none" id="notes" name="notes" placeholder="Add details about this debt..." rows="3"></textarea>
</div>
</form>
<!-- Footer Actions -->
<div class="flex items-center justify-end gap-md px-lg py-md border-t border-outline-variant/40 bg-surface-container-high/50">
<button class="px-lg py-[10px] rounded-lg font-label-md text-label-md text-on-surface border border-outline-variant/0 hover:border-outline-variant hover:bg-surface-variant transition-all focus:outline-none focus:ring-2 focus:ring-outline-variant" type="button">
                    Cancel
                </button>
<button class="px-lg py-[10px] rounded-lg font-label-md text-label-md bg-primary-container text-on-primary-container hover:brightness-110 active:brightness-95 transition-all shadow-[0_2px_8px_rgba(37,99,235,0.25)] focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-surface-container" type="submit">
                    Add Debt
                </button>
</div>
</div>
</div>
</body></html>
